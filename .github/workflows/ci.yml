name: CI

# Her push'ta backend ve frontend'in DERLENDİĞİNİ doğrular (deploy'u bozacak
# hatalar burada yakalanır). Lint ve testler bilgi amaçlıdır; işi düşürmez.
# Not: admin-panel repoya gönderilmediği için (yalnızca lokal) CI'da yer almaz.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: 'postgresql://user:pass@localhost:5432/davetim_ci?schema=public'
      JWT_SECRET: 'ci-test-secret-not-for-production-use-only'
      NODE_ENV: 'test'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Unit tests (bilgi amaçlı, işi düşürmez)
        run: npm test -- --ci
        continue-on-error: true

  frontend:
    name: Frontend (type check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check + build
        run: npm run build:check

      - name: Lint (bilgi amaçlı, işi düşürmez)
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (bilgi amaçlı, işi düşürmez)
        run: npm test
        continue-on-error: true
