<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131a2b"/>
      <stop offset="0.6" stop-color="#1c2740"/>
      <stop offset="1" stop-color="#0d1220"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.25" r="0.55">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c65c"/>
      <stop offset="1" stop-color="#b5952f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Monogram badge (favicon tasariminin buyutulmus hali) -->
  <g transform="translate(90,175)">
    <rect width="150" height="150" rx="32" fill="#0d1220" stroke="url(#gold)" stroke-opacity="0.4" stroke-width="2"/>
    <path d="M47 37 h23 c22 0 37 15 37 37 s-15 37 -37 37 h-23 z M62 51 v46 h8 c13.4 0 22 -9 22 -23 s-8.6 -23 -22 -23 z"
          fill="url(#gold)" fill-rule="evenodd"/>
    <circle cx="106" cy="44" r="14" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <path d="M100 26 l6.3 -8 l6.3 8" fill="none" stroke="url(#gold)" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="280" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="88" fill="#ffffff" font-weight="600">Davetim</text>
  <rect x="282" y="296" width="230" height="3" fill="url(#gold)" opacity="0.7"/>
  <text x="280" y="340" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#e6c65c" letter-spacing="1">Animasyonlu Dijital Davetiye</text>
  <text x="280" y="382" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#c7cede">Düğün · Kına Gecesi · Doğum Günü · Kutlama</text>

  <!-- Ozellik rozetleri -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffffff">
    <rect x="280" y="415" width="150" height="42" rx="21" fill="#ffffff" fill-opacity="0.08"/>
    <text x="303" y="442">Geri Sayım</text>
    <rect x="442" y="415" width="130" height="42" rx="21" fill="#ffffff" fill-opacity="0.08"/>
    <text x="465" y="442">RSVP</text>
    <rect x="584" y="415" width="150" height="42" rx="21" fill="#ffffff" fill-opacity="0.08"/>
    <text x="607" y="442">Google Harita</text>
  </g>
</svg>
