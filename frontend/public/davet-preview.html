<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davet Önizleme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Amatic+SC:wght@700&family=Italianno&family=Sacramento&family=Pacifico&family=Caveat:wght@500;600&family=Allura&family=Petit+Formal+Script&family=Montserrat:wght@300;400;500;600&family=Mulish:wght@300;400;600&family=Jost:wght@300;400;500&family=Cinzel:wght@400;500;600&family=Monoton&family=Amiri:ital,wght@0,400;0,700&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=IBM+Plex+Mono:wght@400;600&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Montserrat',sans-serif;color:#444;overflow-x:hidden;background:#fff}
  #app{min-height:100vh}
  section{padding:64px 24px;text-align:center;position:relative}
  .intro-gate{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;background:#111;cursor:pointer;transition:opacity .75s ease,visibility .75s ease}
  .intro-gate.done{opacity:0;visibility:hidden;pointer-events:none}
  .intro-bg{position:absolute;inset:-5%;background-size:cover;background-position:center;filter:brightness(.55) saturate(1.08);transform:scale(1.08);animation:intro-ken 4.6s ease-out forwards}
  .intro-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.18),transparent 28%),linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.72))}
  .intro-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,.74) 82%)}
  .intro-curtain{position:absolute;top:0;bottom:0;width:51%;background:linear-gradient(90deg,rgba(0,0,0,.98),rgba(28,19,12,.88));animation:intro-curtain 2.7s cubic-bezier(.7,0,.2,1) .9s forwards}
  .intro-curtain.left{left:0;transform-origin:left}
  .intro-curtain.right{right:0;transform-origin:right;animation-name:intro-curtain-r}
  .intro-sweep{position:absolute;inset:-20%;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.28) 48%,transparent 62%);transform:translateX(-75%) rotate(8deg);animation:intro-sweep 2.2s ease-out .55s forwards}
  .intro-card{position:relative;z-index:2;width:min(86vw,520px);text-align:center;padding:28px 18px;animation:intro-card 1.15s ease-out both}
  .intro-kicker{font-size:11px;letter-spacing:5px;text-transform:uppercase;font-weight:600;opacity:.88}
  .intro-monogram{width:86px;height:86px;border:1px solid rgba(255,255,255,.62);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:18px auto 16px;font-family:'Cormorant Garamond',serif;font-size:30px;background:rgba(255,255,255,.08);box-shadow:0 0 0 12px rgba(255,255,255,.04)}
  .intro-names{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,10vw,70px);font-weight:500;line-height:1.02;text-shadow:0 8px 26px rgba(0,0,0,.45)}
  .intro-date{margin-top:14px;font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.9}
  .intro-open{margin-top:28px;display:inline-flex;align-items:center;justify-content:center;min-width:168px;padding:12px 24px;border:1px solid rgba(255,255,255,.72);border-radius:999px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#fff;animation:intro-pulse 1.7s ease-in-out infinite}
  @keyframes intro-ken{to{transform:scale(1)}}
  @keyframes intro-card{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes intro-curtain{to{transform:translateX(-104%)}}
  @keyframes intro-curtain-r{to{transform:translateX(104%)}}
  @keyframes intro-sweep{to{transform:translateX(75%) rotate(8deg)}}
  @keyframes intro-pulse{0%,100%{transform:translateY(0);box-shadow:0 0 0 0 rgba(255,255,255,.24)}50%{transform:translateY(-2px);box-shadow:0 0 0 10px rgba(255,255,255,0)}}
  @media (prefers-reduced-motion: reduce){.intro-gate{display:none}.intro-bg,.intro-curtain,.intro-sweep,.intro-card,.intro-open{animation:none}}
  .decor{position:fixed;inset:0;pointer-events:none;z-index:4;overflow:hidden}
  .decor span{position:absolute;top:-20px;animation:fall linear infinite}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:0}10%{opacity:.8}100%{transform:translateY(106vh) rotate(360deg);opacity:0}}

  /* Hediye: mum üflenince bir kerelik gül/çiçek yağmuru */
  .rose-rain{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  .rose-rain span{position:absolute;top:-40px;opacity:0;animation:rose-fall linear forwards}
  @keyframes rose-fall{0%{transform:translateY(-40px) rotate(0deg);opacity:0}8%{opacity:1}100%{transform:translateY(112vh) rotate(400deg);opacity:.92}}
  .stars span{position:absolute;background:#fff;border-radius:50%;animation:tw ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}
  #fw{position:fixed;inset:0;z-index:0;pointer-events:none}

  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;z-index:2}
  .reveal{opacity:0;transform:translateY(26px);animation:rev 1.2s forwards}
  @keyframes rev{to{opacity:1;transform:none}}
  .eyebrow{letter-spacing:5px;font-size:12px;text-transform:uppercase;font-weight:600}
  .names{line-height:1.02;margin:10px 0}
  .amp{display:block;font-size:.45em;opacity:.85}
  .ornament{width:200px;margin:14px auto;display:flex;align-items:center;justify-content:center;gap:14px;font-size:15px}
  .ornament::before,.ornament::after{content:"";height:1px;flex:1}
  .subtitle{font-family:'Cormorant Garamond',serif;font-size:21px;font-style:italic}
  .scroll-cue{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:3px;animation:bob 2s infinite}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}

  .fade{opacity:0;transform:translateY(30px);transition:opacity .8s,transform .8s}
  .fade.show{opacity:1;transform:none}
  h2.title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;margin-bottom:6px}
  .tsub{font-size:12px;letter-spacing:4px;text-transform:uppercase;margin-bottom:26px}
  .lead{font-family:'Cormorant Garamond',serif;font-size:22px;line-height:1.7;max-width:500px;margin:0 auto;font-style:italic}

  .countdown{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:12px}
  .cd-box{border-radius:14px;padding:16px 6px;min-width:78px}
  .cd-num{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;line-height:1}
  .cd-lab{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:7px;opacity:.8}

  .cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .card{border-radius:16px;padding:26px 20px;min-width:170px;flex:1;max-width:240px}
  .card .ico{font-size:26px;margin-bottom:8px}
  .card h3{font-family:'Cormorant Garamond',serif;font-size:21px;margin-bottom:6px}
  .card p{font-size:14px;line-height:1.6;opacity:.85}

  .tl{max-width:480px;margin:0 auto;text-align:left;position:relative;padding-left:32px}
  .tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px}
  .tl .it{position:relative;margin-bottom:22px}
  .tl .it::before{content:"";position:absolute;left:-30px;top:4px;width:12px;height:12px;border-radius:50%}
  .tl .it .w{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.75}
  .tl .it h4{font-size:19px;margin:1px 0}
  .tl .it p{font-size:14px;line-height:1.55;opacity:.85}

  .gal{max-width:520px;margin:0 auto;position:relative;border-radius:16px;overflow:hidden;box-shadow:0 14px 36px rgba(0,0,0,.16)}
  .gal .fr{padding-top:64%}
  .gal .sl{position:absolute;inset:0;opacity:0;transition:opacity .9s}
  .gal .sl.on{opacity:1}
  /* Fotoğraf kesilmesin diye: arkada bulanık dolgu (bg) + önde tam görünen fotoğraf (fg) */
  .gal .sl .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(24px) brightness(.7);transform:scale(1.15)}
  .gal .sl .fg{position:absolute;inset:0;background-size:contain;background-position:center;background-repeat:no-repeat}
  .gal .sl .sl-cap{position:absolute;bottom:0;left:0;right:0;padding:24px 20px 20px;background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);color:#fff;font-size:15px;text-align:center;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
  .dots{display:flex;gap:7px;justify-content:center;margin-top:14px}
  .dots span{width:9px;height:9px;border-radius:50%;opacity:.4;transition:.3s}
  .dots span.on{opacity:1;transform:scale(1.25)}

  .fam{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;max-width:560px;margin:0 auto}
  .fam .fc{flex:1;min-width:190px;max-width:260px;border-radius:14px;padding:24px 20px}
  .fam .fc .s{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:6px}
  .fam .fc .n{font-size:19px;line-height:1.5}

  .map-frame{margin-top:20px;border-radius:16px;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.14)}
  .map-frame iframe{width:100%;height:300px;border:0;display:block}
  .btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:40px;font-size:12px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;cursor:pointer;border:1px solid;font-weight:600;transition:.3s}

  .rsvp-card{border-radius:18px;padding:34px 22px;max-width:460px;margin:22px auto 0}
  .choice{display:flex;gap:10px;margin:6px 0 16px}
  .choice button{flex:1 1 0;min-width:0;padding:13px 6px;border-radius:12px;border:2px solid;background:transparent;font-family:inherit;font-size:13.5px;line-height:1.2;font-weight:600;cursor:pointer;transition:.25s;text-align:center}
  .field{text-align:left;margin-bottom:12px}
  .field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;opacity:.75;margin-bottom:5px}
  .field input,.field textarea{width:100%;padding:11px 13px;border-radius:10px;border:1px solid;font-family:inherit;font-size:15px}
  .field input:focus,.field textarea:focus{outline:none}
  .send{width:100%;padding:14px;border:none;border-radius:11px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
  .thanks{display:none;text-align:center;padding:12px}
  .thanks.show{display:block;animation:rev .7s forwards}
  .thanks .ck{font-size:48px}
  .thanks h3{font-family:'Cormorant Garamond',serif;font-size:26px;margin:6px 0}
  .wa{display:inline-block;margin-top:10px;padding:10px 22px;background:#25d366;color:#fff;text-decoration:none;border-radius:40px;font-size:13px;font-weight:600}

  footer{padding:44px 18px;text-align:center}
  footer .fn{line-height:1}
  footer p{font-size:12px;letter-spacing:2px;margin-top:8px;opacity:.85}

  .fab{position:fixed;right:16px;z-index:9999;width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;font-size:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;transition:transform .25s}
  .fab:hover{transform:scale(1.08)}
  .fab.share{bottom:16px}
  .fab.playing{animation:spin 4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Müzik butonu: yuvarlak fab değil, ikon + eşitleyici çubuklar + etiket içeren hap (pill) —
     anasayfa tanıtım vitrinindeki "Arka Plan Müziği" görseliyle aynı tasarım. Müzik artık
     otomatik başlamıyor; bu buton her zaman görünür ve dokunulmasını bekler. */
  .fab.music{
    left:16px;right:auto;bottom:16px;width:auto;height:auto;min-height:0;
    border-radius:30px;padding:8px 16px 8px 8px;display:flex;align-items:center;gap:9px;
    font-size:12.5px;font-weight:600;font-family:inherit;white-space:nowrap;
    animation:musicPulse 1.8s ease-in-out infinite;
  }
  .fab.music.playing{animation:none}
  .fab.music .mp-icon{
    width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.28);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:12px;
  }
  .fab.music .mp-bars{display:flex;align-items:flex-end;gap:2px;height:13px;flex-shrink:0}
  .fab.music .mp-bars i{width:2px;border-radius:1px;background:currentColor;opacity:.9;display:block;transform:scaleY(.35)}
  .fab.music.playing .mp-bars i{animation:mpBar 1.1s ease-in-out infinite}
  .fab.music .mp-bars i:nth-child(1){animation-delay:0s;height:40%}
  .fab.music .mp-bars i:nth-child(2){animation-delay:.12s;height:90%}
  .fab.music .mp-bars i:nth-child(3){animation-delay:.24s;height:55%}
  .fab.music .mp-bars i:nth-child(4){animation-delay:.36s;height:100%}
  .fab.music .mp-bars i:nth-child(5){animation-delay:.48s;height:65%}
  @keyframes mpBar{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
  /* Otomatik oynatma yok — buton her zaman hafifçe nabız gibi atarak dokunmaya davet eder */
  .fab.music.needs-tap{animation:musicPulse 1.8s ease-in-out infinite}
  @keyframes musicPulse{0%,100%{box-shadow:0 8px 20px rgba(0,0,0,.28)}50%{box-shadow:0 8px 20px rgba(0,0,0,.28),0 0 0 8px rgba(255,255,255,.28)}}

  /* Kutlama: video + imza */
  .vid{border-radius:18px;overflow:hidden;max-width:560px;margin:0 auto;aspect-ratio:16/9;background:#000;box-shadow:0 10px 30px rgba(0,0,0,.18)}
  .vid iframe,.vid video{width:100%;height:100%;display:block;border:0;object-fit:cover}
  .sign{letter-spacing:.5px}

  /* Kutlama: mum üflenen pasta */
  .cake-hint{font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;margin-bottom:22px;animation:pulse-hint 1.8s ease-in-out infinite}
  @keyframes pulse-hint{0%,100%{opacity:.5}50%{opacity:.95}}
  .cake-wrap{position:relative;width:190px;height:190px;margin:0 auto;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
  .cake-candle{position:absolute;left:50%;top:38px;transform:translateX(-50%);width:7px;height:36px;border-radius:3px;
    background:repeating-linear-gradient(180deg,#fff 0 6px,#ffd166 6px 12px);box-shadow:0 0 0 1px rgba(0,0,0,.06)}
  .cake-flame{position:absolute;left:50%;top:14px;transform:translateX(-50%);width:16px;height:24px;border-radius:50% 50% 50% 50%/65% 65% 35% 35%;
    background:radial-gradient(circle at 50% 32%,#fff8d6,#ffb300 55%,#ff6d00 100%);
    filter:drop-shadow(0 0 10px rgba(255,150,0,.65));transition:opacity .35s,transform .35s;transform-origin:bottom center;
    animation:flicker 1.3s ease-in-out infinite}
  @keyframes flicker{0%,100%{transform:translateX(-50%) scale(1) rotate(-2deg)}50%{transform:translateX(-50%) scale(1.08,.94) rotate(2deg)}}
  .cake-wrap.blown .cake-flame{opacity:0;transform:translateX(-50%) scale(.2);animation:none}
  .cake-smoke{position:absolute;left:50%;top:10px;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;
    background:rgba(160,160,160,.55);opacity:0;pointer-events:none}
  .cake-wrap.blown .cake-smoke{animation:smoke-rise 1.1s ease-out forwards}
  @keyframes smoke-rise{0%{opacity:.7;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(2.6)}}
  .cake-tier{position:absolute;left:50%;transform:translateX(-50%);border-radius:14px;box-shadow:inset 0 -6px 10px rgba(0,0,0,.08),0 6px 14px rgba(0,0,0,.1)}
  .cake-tier::before{content:"";position:absolute;left:0;right:0;top:-7px;height:14px;border-radius:50%/10px}
  .cake-tier1{top:74px;width:96px;height:46px}
  .cake-tier2{top:112px;width:130px;height:46px}
  .cake-tier3{top:150px;width:170px;height:40px}
  .cake-dot{position:absolute;width:7px;height:7px;border-radius:50%;top:6px}
  .cake-txt{margin-top:16px;font-size:14px;opacity:0;transition:opacity .5s;min-height:20px}
  .cake-wrap.blown ~ .cake-txt{opacity:1}

  /* ===== Dini düğün: altın kapı girişi ===== */
  .dg-gate{position:fixed;inset:0;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 18%,#ecd9a8 0%,#cfa855 55%,#a97f35 100%);transition:opacity .9s ease,visibility .9s ease}
  .dg-gate.done{opacity:0;visibility:hidden;pointer-events:none}
  .dg-gate .spark{position:absolute;background:#fff;border-radius:50%;animation:tw ease-in-out infinite;pointer-events:none}
  .dg-ar{font-family:'Amiri','Cormorant Garamond',serif;font-size:24px;color:#fff8e3;text-shadow:0 2px 10px rgba(102,72,17,.55)}
  .dg-tr{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15.5px;color:#fffdf4;opacity:.92;letter-spacing:.5px}
  .dg-frame{width:min(72vw,290px);height:min(54vh,410px);border:2px solid rgba(255,250,232,.8);border-radius:150px 150px 12px 12px;padding:9px;display:flex;gap:5px;perspective:1100px;
    box-shadow:0 26px 60px rgba(90,62,12,.35),inset 0 0 40px rgba(255,244,214,.25);margin:6px 0 4px}
  .dg-door{flex:1;position:relative;transition:transform 1.7s cubic-bezier(.66,0,.22,1);
    background:repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0 2px,transparent 2px 15px),repeating-linear-gradient(-45deg,rgba(255,255,255,.08) 0 2px,transparent 2px 15px),linear-gradient(200deg,#e7c47c 0%,#cf9f4b 55%,#b98a3c 100%);
    box-shadow:inset 0 0 24px rgba(120,84,20,.35)}
  .dg-door.left{transform-origin:left center;border-radius:140px 6px 6px 6px}
  .dg-door.right{transform-origin:right center;border-radius:6px 140px 6px 6px}
  .dg-door::after{content:"";position:absolute;top:50%;width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff3cf,#c19040);box-shadow:0 2px 6px rgba(90,62,12,.5)}
  .dg-door.left::after{right:7px}
  .dg-door.right::after{left:7px}
  .dg-gate.open .dg-door.left{transform:rotateY(-104deg)}
  .dg-gate.open .dg-door.right{transform:rotateY(104deg)}
  .dg-open{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;border:none;border-radius:999px;
    background:linear-gradient(120deg,#8a6420,#b08a3e 50%,#8a6420);color:#fff8e3;font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;letter-spacing:1px;cursor:pointer;
    box-shadow:0 12px 28px rgba(90,62,12,.4);animation:intro-pulse 1.8s ease-in-out infinite}
  .dg-gate.open .dg-open{opacity:0;transition:opacity .5s}
  @media (prefers-reduced-motion: reduce){.dg-gate{display:none}}

  /* Dini düğün bölümleri */
  .dini-ar{font-family:'Amiri','Cormorant Garamond',serif;font-size:26px;line-height:1.7}
  .dini-heart{font-size:24px;margin:2px 0}
  .dini-msg{letter-spacing:2.5px;font-size:12.5px;line-height:2.05;text-transform:uppercase;max-width:360px;margin:14px auto 0}
  .dini-card{max-width:430px;margin:0 auto;border-radius:20px;padding:34px 26px;box-shadow:0 16px 40px rgba(120,90,30,.12)}
  .dini-tag{font-size:11px;letter-spacing:4px;font-weight:700;margin-bottom:10px}
  .dini-card h3{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin-bottom:4px}
  .dini-orn{font-size:13px;opacity:.65;margin-bottom:14px}
  .dini-date{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:1px;margin-bottom:10px}
  .dini-line{font-size:14px;margin-bottom:8px;line-height:1.55}
  .dini-dir{display:inline-flex;align-items:center;gap:7px;margin-top:14px;padding:12px 26px;border-radius:999px;color:#fff;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1px;transition:.25s}
  .dini-dir:hover{filter:brightness(1.1)}
  .dini-sky{opacity:.18;display:block;margin:0 auto}
  .dini-moon{font-size:34px;display:block;margin:8px 0 10px}
  .dini-dua{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;line-height:1.7;max-width:440px;margin:0 auto}
  .dini-names{letter-spacing:5px;font-size:15px;font-weight:600;margin-top:18px}

  /* ===== Tema bazlı yerleşim kimlikleri ===== */
  /* Yıldız Haritası: cam efektli kutular, ışıldayan kenarlar */

  /* ===== Zarf açılış introsu ===== */
  .env-gate{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .8s ease,visibility .8s ease}
  .env-gate.done{opacity:0;visibility:hidden;pointer-events:none}
  .env-wrap{position:relative;width:min(78vw,340px);aspect-ratio:4/3;perspective:1000px}
  .env-body{position:absolute;inset:0;border-radius:10px;box-shadow:0 30px 70px rgba(0,0,0,.35)}
  .env-flap{position:absolute;left:0;right:0;top:0;height:52%;transform-origin:top center;border-radius:10px 10px 0 0;
    clip-path:polygon(0 0,100% 0,50% 100%);transition:transform 1.1s cubic-bezier(.6,0,.3,1);z-index:3}
  .env-card{position:absolute;left:6%;right:6%;top:8%;bottom:8%;background:#fffdf6;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    box-shadow:0 8px 26px rgba(0,0,0,.22);z-index:2;transition:transform 1.1s cubic-bezier(.5,0,.2,1) .5s}
  .env-card .ec-names{font-size:clamp(24px,7vw,38px);line-height:1.1;text-align:center;padding:0 12px}
  .env-card .ec-date{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;opacity:.7}
  .env-gate.open .env-flap{transform:rotateX(-175deg)}
  .env-gate.open .env-card{transform:translateY(-46%) scale(1.06)}
  .env-hint{position:absolute;bottom:-52px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#fff;opacity:.85;white-space:nowrap;animation:intro-pulse 1.8s ease-in-out infinite;padding:9px 18px;border:1px solid rgba(255,255,255,.5);border-radius:999px;background:rgba(255,255,255,.08);backdrop-filter:blur(8px)}
  .env-gate.open .env-hint{opacity:0;transition:opacity .4s}

  /* ===== Çiçek patlaması introsu ===== */
  .fl-gate{position:fixed;inset:0;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;overflow:hidden;transition:opacity .8s ease,visibility .8s ease}
  .fl-gate.done{opacity:0;visibility:hidden;pointer-events:none}
  .fl-names{font-size:clamp(34px,9vw,64px);text-align:center;line-height:1.1;padding:0 16px;z-index:2}
  .fl-hint{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;padding:10px 22px;border-radius:999px;border:1px solid currentColor;opacity:.85;animation:intro-pulse 1.8s ease-in-out infinite;z-index:2}
  .fl-gate.open .fl-hint{opacity:0;transition:opacity .3s}
  .fl-petal{position:absolute;left:50%;top:50%;font-size:22px;opacity:0;pointer-events:none;transition:transform 1.6s cubic-bezier(.2,.6,.3,1),opacity 1.6s ease}
  .fl-gate.open .fl-petal{opacity:1}

  /* ===== Lightbox (galeri + anı albümü) ===== */
  .lb{position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s}
  .lb.on{opacity:1;visibility:visible}
  .lb img{max-width:92vw;max-height:84vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .lb-btn{position:absolute;width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
  .lb-close{top:18px;right:18px}
  .lb-prev{left:14px;top:50%;transform:translateY(-50%)}
  .lb-next{right:14px;top:50%;transform:translateY(-50%)}
  .lb-cap{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;opacity:.85;max-width:86vw;text-align:center}
  .gal .sl .fg{cursor:zoom-in}
  .ga-item{cursor:zoom-in}

  /* ===== Paralaks ===== */
  .plx{will-change:transform}

function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function firstPhoto(cfg){
  if(!cfg || !cfg.photos || !cfg.photos.length) return '';

function initials(name){

/* İstenen açılış stilini seçip uygular: perde (varsayılan) | zarf | cicek */
function showIntro(cfg,T,couple,isThumb,lang){
  var style = String((cfg&&cfg.introStyle)||'perde');
  if(style==='zarf') return showEnvelopeIntro(cfg,T,couple,isThumb,lang);
  if(style==='cicek') return showFlowerIntro(cfg,T,couple,isThumb,lang);
  return showCurtainIntro(cfg,T,couple,isThumb,lang);
}

function introAllowed(cfg,isThumb){
  var previewMode = !!(cfg && cfg.__showIntroPreview);
  if((cfg && cfg.__skipIntro) || (!previewMode && introPlayed) || (previewMode && introPreviewDismissed) || isThumb || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) return false;
  if(!previewMode) introPlayed=true;
  return true;
}

/* Zarf açılışı: mühürlü zarf, dokununca kapak açılır ve kart yükselir */
function showEnvelopeIntro(cfg,T,couple,isThumb,lang){
  if(!introAllowed(cfg,isThumb)) return;
  var previewMode = !!(cfg && cfg.__showIntroPreview);
  document.querySelectorAll('.env-gate,.intro-gate,.fl-gate').forEach(function(x){x.remove();});
  var gate=el('div','env-gate');
  gate.style.background='radial-gradient(120% 100% at 50% 25%,'+T.soft+'33,transparent 60%),'+(T.dark?T.page:'#2c2418');
  gate.innerHTML=
    '<div class="env-wrap">'+
      '<div class="env-card"><div class="ec-names" style="font-family:\''+(cfg.nameFont||T.nameFont)+'\',cursive;color:'+T.accent+'">'+esc(couple)+'</div><div class="ec-date" style="color:#7c6a4a">'+esc(fmtDate(cfg.date,lang))+'</div></div>'+
      '<div class="env-flap" style="background:linear-gradient(180deg,'+T.accent+','+T.soft+')"></div>'+
      '<div class="env-body" style="background:linear-gradient(160deg,'+T.soft+','+T.accent+')"></div>'+
      '<div class="env-hint">DAVETİYEYİ AÇ</div>'+
    '</div>';
  var opened=false;
  function open(){
    if(opened)return; opened=true;
    gate.classList.add('open');
    setTimeout(function(){ if(previewMode) introPreviewDismissed=true; gate.classList.add('done'); setTimeout(function(){gate.remove();},850); },1400);
  }
  gate.addEventListener('click',open);
  gate.addEventListener('touchend',open);
  document.body.appendChild(gate);
  if(!previewMode) setTimeout(open,4500);
}

/* Çiçek patlaması: isimler ortada, dokununca yapraklar dört yana saçılır */
function showFlowerIntro(cfg,T,couple,isThumb,lang){
  if(!introAllowed(cfg,isThumb)) return;
  var previewMode = !!(cfg && cfg.__showIntroPreview);
  document.querySelectorAll('.env-gate,.intro-gate,.fl-gate').forEach(function(x){x.remove();});
  var gate=el('div','fl-gate');
  gate.style.background=T.bg; gate.style.color=T.dark?'#fff':T.accent;
  var petals='';
  for(var i=0;i<36;i++){ petals+='<span class="fl-petal">'+(['🌸','🌺','🌷','💮','✿'][i%5])+'</span>'; }
  gate.innerHTML=petals+
    '<div class="fl-names" style="font-family:\''+(cfg.nameFont||T.nameFont)+'\',cursive">'+esc(couple)+'</div>'+
    '<div class="fl-hint">✿ DOKUN, ÇİÇEKLER AÇSIN ✿</div>';
  var opened=false;
  function open(){
    if(opened)return; opened=true;
    gate.classList.add('open');
    gate.querySelectorAll('.fl-petal').forEach(function(p){
      var a=Math.random()*Math.PI*2, d=140+Math.random()*Math.max(window.innerWidth,window.innerHeight)*0.55;
      p.style.transform='translate('+(Math.cos(a)*d)+'px,'+(Math.sin(a)*d)+'px) rotate('+(Math.random()*720-360)+'deg) scale('+(0.8+Math.random()*1.6)+')';
    });
    setTimeout(function(){ if(previewMode) introPreviewDismissed=true; gate.classList.add('done'); setTimeout(function(){gate.remove();},850); },1500);
  }
  gate.addEventListener('click',open);
  gate.addEventListener('touchend',open);
  document.body.appendChild(gate);
  if(!previewMode) setTimeout(open,4500);
}

function showCurtainIntro(cfg,T,couple,isThumb,lang){
  var previewMode = !!(cfg && cfg.__showIntroPreview);
  if((cfg && cfg.__skipIntro) || (!previewMode && introPlayed) || (previewMode && introPreviewDismissed) || isThumb || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) return;
  if(!previewMode) introPlayed=true;
  document.querySelectorAll('.intro-gate').forEach(function(x){x.remove();});
  var photo=firstPhoto(cfg);
  var gate=el('div','intro-gate');
  gate.setAttribute('role','button');
  gate.setAttribute('aria-label','Daveti ac');
  var bgStyle=photo?'background-image:url(&quot;'+photo.replace(/"/g,'&quot;')+'&quot;)':'background:'+T.bg;
  var monogram=initials(couple).replace('&','') || initials(cfg.brideName) || 'D';
  gate.innerHTML=
    '<div class="intro-bg" style="'+bgStyle+'"></div>'+
    '<div class="intro-vignette"></div>'+
    '<div class="intro-sweep"></div>'+
    '<div class="intro-curtain left"></div><div class="intro-curtain right"></div>'+
    '<div class="intro-card">'+
      '<div class="intro-kicker">DAVETIYE</div>'+
      '<div class="intro-monogram">'+esc(monogram)+'</div>'+
      '<div class="intro-names">'+esc(couple)+'</div>'+
      '<div class="intro-date">'+esc(fmtDate(cfg.date, lang))+'</div>'+
      '<div class="intro-open">DOKUN VE AC</div>'+
    '</div>';
  function finish(){ if(previewMode) introPreviewDismissed=true; gate.classList.add('done'); setTimeout(function(){ gate.remove(); },850); }
  gate.addEventListener('click',finish);
  gate.addEventListener('touchend',finish);
  document.body.appendChild(gate);
  if(!previewMode) setTimeout(finish,4200);
}
function months(lang){
  if (lang === 'en') return ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (lang === 'de') return ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
}
function days(lang){
  if (lang === 'en') return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if (lang === 'de') return ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  return ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
}
function fmtDate(d, lang){var dt=new Date(d);if(isNaN(dt))return '';return dt.getDate()+' '+months(lang)[dt.getMonth()]+' '+dt.getFullYear();}
function fmtTime(d){var dt=new Date(d);if(isNaN(dt))return '';return ('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);}
function fmtDay(d, lang){var dt=new Date(d);if(isNaN(dt))return '';return days(lang)[dt.getDay()];}

/* ============ DİNİ DÜĞÜN RENDER (besmele + kına & düğün kartları + dua) ============ */
function showDiniGate(cfg){
  var previewMode = !!(cfg && cfg.__showIntroPreview);
  if((cfg && cfg.__skipIntro) || (!previewMode && introPlayed) || (previewMode && introPreviewDismissed) || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) return;
  if(!previewMode) introPlayed=true;
  document.querySelectorAll('.dg-gate').forEach(function(x){x.remove();});
  var gate=el('div','dg-gate');
  var sparks='';
  for(var i=0;i<26;i++){
    var z=1.4+Math.random()*2.4;
    sparks+='<span class="spark" style="width:'+z+'px;height:'+z+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;animation-duration:'+(1.6+Math.random()*3)+'s;animation-delay:'+(Math.random()*4)+'s"></span>';
  }
  gate.innerHTML=sparks+
    '<div class="dg-ar">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>'+
    '<div class="dg-tr">Rahman ve Rahim olan Allah\'ın adıyla</div>'+
    '<div class="dg-frame"><div class="dg-door left"></div><div class="dg-door right"></div></div>'+
    '<button class="dg-open" type="button">✦ Davetiyeyi Aç ✦</button>';
  var opened=false;
  function open(){
    if(opened)return; opened=true;
    gate.classList.add('open');
    setTimeout(function(){
      if(previewMode) introPreviewDismissed=true;
      gate.classList.add('done');
      setTimeout(function(){ gate.remove(); },950);
    },1250);
  }
  gate.querySelector('.dg-open').addEventListener('click',open);
  gate.addEventListener('click',open);
  document.body.appendChild(gate);
}

    '<div class="ga-grid" id="gaGrid"></div>'+
    '<div class="ga-empty" id="gaEmpty" style="color:'+inkSoft+';display:none">İlk fotoğrafı sen yükle!</div>'+
    '<button class="ga-upload" id="gaBtn" style="background:'+T.accent+'">📷 Fotoğraf Yükle</button>'+
    '<input type="file" id="gaFile" accept="image/*" style="display:none">'+
    '<div class="ga-status" id="gaStatus" style="color:'+inkSoft+'"></div>';
  wrap.appendChild(s);

  var grid=s.querySelector('#gaGrid'), empty=s.querySelector('#gaEmpty');
  var btn=s.querySelector('#gaBtn'), fileIn=s.querySelector('#gaFile'), status=s.querySelector('#gaStatus');

  function renderList(list){
    grid.innerHTML='';
    if(!list || !list.length){ empty.style.display='block'; return; }
    empty.style.display='none';
    var urls=list.map(function(p){return p.url;});
    var caps=list.map(function(p){return p.guestName||'';});
    list.forEach(function(p,i){
      var d=el('div','ga-item');
      d.innerHTML='<img loading="lazy" src="'+esc(p.url)+'" alt="">'+(p.guestName?'<span class="ga-name">'+esc(p.guestName)+'</span>':'');
      d.addEventListener('click',function(){ openLightbox(urls,caps,i); });
      grid.appendChild(d);
    });
  }

  fetch(apiBase+'/guest-photos/invitation/'+encodeURIComponent(cfg.invitationId))
    .then(function(r){return r.json();})
    .then(function(list){ if(Array.isArray(list)) renderList(list); })
    .catch(function(){});

  btn.addEventListener('click',function(){ fileIn.click(); });
  fileIn.addEventListener('change',function(){
    var f=fileIn.files && fileIn.files[0];
    if(!f) return;
    if(f.size>10*1024*1024){ status.textContent='Fotoğraf en fazla 10 MB olabilir.'; return; }
    var name='';
    try{ name=window.prompt('Adınız (fotoğrafın altında görünür, boş bırakabilirsiniz):','')||''; }catch(e){}
    btn.disabled=true; status.textContent='Yükleniyor…';
    var fd=new FormData();
    fd.append('file',f);
    fd.append('invitationId',cfg.invitationId);
    if(name) fd.append('guestName',name);
    fetch(apiBase+'/guest-photos',{method:'POST',body:fd})
      .then(function(r){ return r.json().then(function(j){ return {ok:r.ok,j:j}; }); })
      .then(function(res){
        if(!res.ok) throw new Error((res.j&&res.j.message)||'Yüklenemedi');
        status.textContent='Teşekkürler, fotoğrafınız albümde! 💛';
        return fetch(apiBase+'/guest-photos/invitation/'+encodeURIComponent(cfg.invitationId)).then(function(r){return r.json();});
      })
      .then(function(list){ if(Array.isArray(list)) renderList(list); })
      .catch(function(e){ status.textContent=(e&&e.message)||'Yüklenemedi, tekrar deneyin.'; })
      .finally(function(){ btn.disabled=false; fileIn.value=''; });
  });
}

/* ===== Lightbox: galeri ve anı albümü fotoğrafları tam ekran ===== */
var lbState={urls:[],caps:[],idx:0,elm:null};
function openLightbox(urls,caps,idx){
  if(!urls || !urls.length) return;
  lbState.urls=urls; lbState.caps=caps||[]; lbState.idx=idx||0;
  if(!lbState.elm){
    var lb=el('div','lb');
    lb.innerHTML='<img alt=""><button class="lb-btn lb-close">✕</button><button class="lb-btn lb-prev">‹</button><button class="lb-btn lb-next">›</button><div class="lb-cap"></div>';
    lb.addEventListener('click',function(e){ if(e.target===lb) closeLightbox(); });
    lb.querySelector('.lb-close').addEventListener('click',closeLightbox);
    lb.querySelector('.lb-prev').addEventListener('click',function(){ lbShow(lbState.idx-1); });
    lb.querySelector('.lb-next').addEventListener('click',function(){ lbShow(lbState.idx+1); });
    document.addEventListener('keydown',function(e){
      if(!lbState.elm || !lbState.elm.classList.contains('on')) return;
      if(e.key==='Escape') closeLightbox();
      if(e.key==='ArrowLeft') lbShow(lbState.idx-1);
      if(e.key==='ArrowRight') lbShow(lbState.idx+1);
    });
    document.body.appendChild(lb);
    lbState.elm=lb;
  }
  lbShow(lbState.idx);
  lbState.elm.classList.add('on');
}
function lbShow(i){
  var n=lbState.urls.length;
  lbState.idx=((i%n)+n)%n;
  lbState.elm.querySelector('img').src=lbState.urls[lbState.idx];
  lbState.elm.querySelector('.lb-cap').textContent=lbState.caps[lbState.idx]||'';
  var multi=n>1?'flex':'none';
  lbState.elm.querySelector('.lb-prev').style.display=multi;
  lbState.elm.querySelector('.lb-next').style.display=multi;
}
function closeLightbox(){ if(lbState.elm) lbState.elm.classList.remove('on'); }

/* ===== Paralaks: kaydırırken hafif derinlik (reduced-motion'da kapalı) ===== */
function setupParallax(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var targets=[];
  document.querySelectorAll('.gal').forEach(function(e){ targets.push({el:e,f:0.05}); });
  document.querySelectorAll('h2.title').forEach(function(e){ targets.push({el:e,f:0.025}); });
  if(!targets.length) return;
  var ticking=false;
  function frame(){
    ticking=false;
    var vh=window.innerHeight;
    targets.forEach(function(t){
      var r=t.el.getBoundingClientRect();
      if(r.bottom<0 || r.top>vh) return;
      var off=(r.top + r.height/2 - vh/2) * t.f;
      t.el.classList.add('plx');
      t.el.style.transform='translateY('+(-off).toFixed(1)+'px)';
    });
  }
  window.addEventListener('scroll',function(){ if(!ticking){ ticking=true; requestAnimationFrame(frame); } },{passive:true});
  frame();
}

function videoEmbed(url,border){
  if(!url) return '';
  var yt=String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  var inner = yt
    ? '<iframe src="https://www.youtube.com/embed/'+yt[1]+'" allow="autoplay; encrypted-media" allowfullscreen frameborder="0"></iframe>'
    : '<video src="'+esc(url)+'" controls playsinline></video>';
  return '<div class="vid" style="border:1px solid '+border+'">'+inner+'</div>';

function startCountdown(date){
  var target=new Date(date).getTime();
  function tk(){var diff=target-Date.now();if(isNaN(diff))diff=0;if(diff<0)diff=0;
    var v=[Math.floor(diff/86400000),Math.floor(diff%86400000/3600000),Math.floor(diff%3600000/60000),Math.floor(diff%60000/1000)];
    for(var i=0;i<4;i++){var e=document.getElementById('cd'+i);if(e)e.textContent=(v[i]<10?'0'+v[i]:''+v[i]);}}
  tk(); cdTimer=setInterval(tk,1000);
}
function setupReveal(){
  var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('show');});},{threshold:.12});
  document.querySelectorAll('.fade').forEach(function(s){obs.observe(s);});
  /* timeline çizgi/nokta renkleri CSS'teki var(--c) ile gelir */
}
function setupGallery(){
  var gal=document.querySelector('.gal'); if(!gal)return;
  var sl=gal.querySelectorAll('.sl'), dots=document.querySelectorAll('.dots span'), cur=0;
  if(sl.length<2)return;
  function show(i){
    sl[cur].classList.remove('on'); dots[cur]&&dots[cur].classList.remove('on');
    cur=((i%sl.length)+sl.length)%sl.length;
    sl[cur].classList.add('on'); dots[cur]&&dots[cur].classList.add('on');
  }
  function restart(){ if(galTimer)clearInterval(galTimer); galTimer=setInterval(function(){show(cur+1);},3600); }
  restart();
  dots.forEach(function(d,i){ d.style.cursor='pointer'; d.addEventListener('click',function(){ show(i); restart(); }); });
  /* elle kaydırma: parmak (touch) ve fare (mouse) ile sola/sağa sürükleyip resim değiştirme */
  gal.style.touchAction='pan-y'; gal.style.cursor='grab';
  /* tıklayınca tam ekran (lightbox) — sürükleme değilse */
  var lbUrls=[], lbCaps=[];
  sl.forEach(function(s){
    var fg=s.querySelector('.fg');
    var m=fg && fg.style.backgroundImage.match(/url\(["']?(.*?)["']?\)/);
    lbUrls.push(m?m[1]:'');
    var cap=s.querySelector('.sl-cap');
    lbCaps.push(cap?cap.textContent:'');
  });
  var startX=0, dx=0, dragging=false;
  gal.addEventListener('pointerdown',function(e){ dragging=true; startX=e.clientX; dx=0; gal.style.cursor='grabbing'; try{gal.setPointerCapture(e.pointerId);}catch(_){} });
  gal.addEventListener('pointermove',function(e){ if(!dragging)return; dx=e.clientX-startX; });
  function endDrag(){
    if(!dragging)return; dragging=false; gal.style.cursor='grab';
    if(Math.abs(dx)>40){ show(cur+(dx<0?1:-1)); restart(); }
    else if(Math.abs(dx)<8){ openLightbox(lbUrls,lbCaps,cur); }
    dx=0;
  }
  gal.addEventListener('pointerup',endDrag);
  gal.addEventListener('pointercancel',endDrag);
  gal.addEventListener('pointerleave',function(){ if(dragging)endDrag(); });
}

  var shTitle = (T.mode==='celebration') ? (couple+' için Doğum Günü Kutlaması') : (T.kind==='birthday' ? (couple+' Doğum Günü Daveti') : (couple+' Düğün Davetiyesi'));
  var shText = (T.mode==='celebration') ? (couple+' için bir kutlama 🎉 İyi ki doğdun!') : (T.kind==='birthday' ? (couple+' doğum günü partisine davetlisiniz! 🎂') : (couple+' düğününe davetlisiniz!'));
  sh.addEventListener('click',function(){var data={title:shTitle,text:shText,url:location.href};if(navigator.share){navigator.share(data).catch(function(){});}else{window.open('https://wa.me/?text='+encodeURIComponent(data.text+' '+location.href),'_blank');}});
  document.body.appendChild(sh);
}

/* ==== Müzik (MP3 varsa MP3, yoksa Web Audio melodi) ==== */
var musicBtn=null;
var currentMusicUrl=null;
function ensureMusicBtn(T){
  removeMusicBtn();
  musicBtn=el('button','fab music needs-tap',
    '<span class="mp-icon">🎵</span><span class="mp-bars"><i></i><i></i><i></i><i></i><i></i></span><span class="mp-label">Arka Plan Müziği</span>');
  musicBtn.style.background=T.accent;musicBtn.style.color=T.dark?'#0b0b0d':'#fff';musicBtn.style.position='fixed';
  musicBtn.addEventListener('click',function(){musicState.playing?stopMusic():startMusic();});
  document.body.appendChild(musicBtn);
}
function removeMusicBtn(){document.querySelectorAll('.fab.music').forEach(function(x){x.remove();});musicBtn=null;}
var SEQ=[[392,493.88,587.33],[329.63,392,493.88],[261.63,329.63,392],[293.66,369.99,440]];
function setPlaying(on){
  var ms=musicState;ms.playing=on;
  if(!musicBtn)return;
  var label=musicBtn.querySelector('.mp-label');
  if(on){
    musicBtn.classList.add('playing');musicBtn.classList.remove('needs-tap');
    if(label)label.textContent='Müzik Çalıyor';
  }else{
    musicBtn.classList.remove('playing');
    if(label)label.textContent='Arka Plan Müziği';
  }
}
function startMusic(silent){
  var ms=musicState;
  // MP3 varsa onu çal
  if(currentMusicUrl){
    if(!ms.audio){ms.audio=new Audio();ms.audio.loop=true;ms.audio.preload='auto';ms.audio.setAttribute('playsinline','');}
    if(ms.audio.src!==currentMusicUrl){ ms.audio.src=currentMusicUrl; try{ms.audio.load();}catch(e){} }
    ms.audio.volume=1; ms.audio.muted=false;
    ms.audio.onerror=function(){ setPlaying(false); if(!silent) alert('Müzik yüklenemedi. Bağlantı doğrudan bir .mp3 dosyası olmalı (YouTube/Drive/Spotify sayfa linki çalışmaz). En sağlamı: editördeki "Dosya Seç" ile mp3\'ü doğrudan yükleyin.'); };
    var p=ms.audio.play();
    if(p&&p.then){ p.then(function(){ setPlaying(true); }).catch(function(err){ setPlaying(false); if(!silent) alert('Müzik çalınamadı: '+((err&&err.message)||'tarayıcı oynatmayı engelledi')+'. Geçerli bir .mp3 bağlantısı deneyin.'); }); }
    else { setPlaying(true); }
    return;
  }
  // Aksi halde yumuşak melodi
  try{
    ms.actx=ms.actx||new (window.AudioContext||window.webkitAudioContext)();
    if(ms.actx.state==='suspended')ms.actx.resume();
  }catch(e){ if(!silent) alert('Müzik başlatılamadı.'); return; }
  ms.master=ms.actx.createGain();ms.master.gain.value=0.5;ms.master.connect(ms.actx.destination);
  function chord(){var t=ms.actx.currentTime, ch=SEQ[ms.step%SEQ.length];ch.forEach(function(f,i){nt(f,t+i*0.16,1.6);});nt(ch[0]/2,t,1.8);ms.step++;}
  function nt(f,t,d){var o=ms.actx.createOscillator(),g=ms.actx.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(ms.master);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.16,t+0.08);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.start(t);o.stop(t+d+0.05);}
  chord();ms.loop=setInterval(chord,1700);setPlaying(true);
}
function stopMusic(){var ms=musicState;clearInterval(ms.loop);if(ms.audio){try{ms.audio.pause();}catch(e){}}if(ms.master&&ms.actx){try{ms.master.gain.exponentialRampToValueAtTime(0.0001,ms.actx.currentTime+0.4);}catch(e){}}setPlaying(false);}
/* Otomatik oynatma denemesi YOK: tarayıcılar zaten çoğu zaman engelliyordu ve garip bir
   davranışa yol açıyordu. Müzik artık yalnızca kullanıcı "Arka Plan Müziği" butonuna
   dokununca başlar — bkz. ensureMusicBtn() ve buradaki click dinleyicisi. */

/* ==== Havai fişek ==== */
var fwRAF=null;
function startFireworks(cv){
  var ctx=cv.getContext('2d'),W,H;function rs(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}rs();window.addEventListener('resize',rs);
  var colors=['#f0d27a','#ef9bb3','#9bd1ef','#c6a8ef','#fff3c4'],rockets=[],sparks=[];
  function launch(){rockets.push({x:Math.random()*W,y:H,vy:-(6+Math.random()*3),ty:H*(0.2+Math.random()*0.35),c:colors[Math.floor(Math.random()*colors.length)]});}
  function boom(x,y,c){var n=44+Math.floor(Math.random()*22);for(var i=0;i<n;i++){var a=Math.PI*2*i/n,sp=1.4+Math.random()*3.2;sparks.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,c:c});}}
  function fr(){ctx.fillStyle='rgba(7,9,18,0.22)';ctx.fillRect(0,0,W,H);
    for(var i=rockets.length-1;i>=0;i--){var r=rockets[i];r.y+=r.vy;r.vy+=0.04;ctx.beginPath();ctx.arc(r.x,r.y,2,0,7);ctx.fillStyle=r.c;ctx.fill();if(r.y<=r.ty||r.vy>=0){boom(r.x,r.y,r.c);rockets.splice(i,1);}}
    for(var j=sparks.length-1;j>=0;j--){var s=sparks[j];s.x+=s.vx;s.y+=s.vy;s.vy+=0.035;s.vx*=0.99;s.life-=0.012;if(s.life<=0){sparks.splice(j,1);continue;}ctx.globalAlpha=Math.max(s.life,0);ctx.beginPath();ctx.arc(s.x,s.y,2,0,7);ctx.fillStyle=s.c;ctx.fill();ctx.globalAlpha=1;}
    fwRAF=requestAnimationFrame(fr);}
  if(fwRAF)cancelAnimationFrame(fwRAF); fr(); if(window.__fwInt)clearInterval(window.__fwInt); window.__fwInt=setInterval(launch,900); launch();
}
